name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/reusable-node-ci.yml

  build-push:
    name: Build, Scan, Sign & Push
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Compute image ref (lowercase + digest)
        id: image
        run: echo "ref=${REGISTRY}/${IMAGE_NAME,,}@${{ steps.build.outputs.digest }}" >>"$GITHUB_OUTPUT"

      - name: Scan image for CVEs (advisory)
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, by digest)
        run: cosign sign --yes ${{ steps.image.outputs.ref }}

  deploy-staging:
    name: Deploy to staging
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
        run: echo "Deploying $IMAGE to staging"

  deploy-production:
    name: Deploy to production
    needs: [build-push, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
        run: echo "Deploying $IMAGE to production"
