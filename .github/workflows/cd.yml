name: CD

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  # Re-run the quality gate: never ship an image if tests are red.
  ci:
    uses: ./.github/workflows/reusable-node-ci.yml

  build-push:
    name: Build, Scan, Sign & Push
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless (OIDC)
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true # supply-chain: attach SBOM attestation
          provenance: mode=max # supply-chain: SLSA provenance

      # Base-OS CVEs are REPORTED to the Security tab and tracked via Dependabot
      # (docker ecosystem) — they don't hard-block releases, because base images
      # routinely carry HIGH advisories with no same-day app-side fix. CVEs we DO
      # control (app + deps) are hard-gated in ci.yml's `trivy-fs` job.
      - name: Scan image for CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload scan results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless, by digest)
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

  deploy-staging:
    name: Deploy to staging
    needs: build-push
    runs-on: ubuntu-latest
    environment: staging # auto-deploy; no approval required
    steps:
      - name: Deploy
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.digest }}
        run: |
          echo "Deploying $IMAGE to staging"
          # ponytail: placeholder. Thay bằng lệnh deploy thật (cần secret/kubeconfig của bạn), ví dụ:
          #   kubectl set image deployment/app app="$IMAGE" -n staging
          #   helm upgrade app ./chart --set image.digest="${{ needs.build-push.outputs.digest }}"
          #   ssh user@host "docker pull $IMAGE && docker compose up -d"

  deploy-production:
    name: Deploy to production
    needs: [build-push, deploy-staging]
    runs-on: ubuntu-latest
    # Approval gate: bật "Required reviewers" cho environment `production`
    # trong Settings → Environments để pipeline dừng chờ duyệt trước khi chạy.
    environment: production
    steps:
      - name: Deploy
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.digest }}
        run: |
          echo "Deploying $IMAGE to production"
          # ponytail: placeholder — dùng cùng kiểu lệnh như deploy-staging, trỏ tới cluster/host prod.
